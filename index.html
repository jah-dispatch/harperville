    <!-- SESSION LOGIC: Only show once per visit -->
    <script>
        // Check if the browser remembers seeing the intro this session
        if (sessionStorage.getItem('hasSeenIntro')) {
            // Immediately redirect without loading the animation
            window.location.replace("splash.html"); 
        } else {
            // Mark that they are seeing it now
            sessionStorage.setItem('hasSeenIntro', 'true');
            // Run the 8-second immersive timer, then redirect
            setTimeout(function() {
                window.location.href = "splash.html";
            }, 8000);
        }
    </script>
