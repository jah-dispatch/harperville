<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Harperville | Blog | New Future Post</title>
    <link rel="stylesheet" href="../../build1.css">
</head>
<body class="main-body">
    <div class="app-container">
        
       <header class="glass-panel nav-header">
            <a href="../../splash.html">
                <img src="/U01-icon.png" alt="U01 Menu" class="nav-icon">
            </a>
            <nav class="hidden-menu">
                <a href="../../about.html">Jack Harper</a>
                <a href="../../advocacy.html">Advocacy</a>
                <a href="../../blog.html">Blog</a>
            </nav>
        </header>

        <main class="content-area">
            
            <h1 class="luckiest-header" style="text-align:center; font-size: 2.2rem; margin-bottom: 5px;">New Future Post</h1>
            <p style="text-align:center; color: var(--gold-aspen); font-weight: bold; margin-bottom: 25px;">Dispatch 002 | May 31, 2026</p>

            <div class="dispatch-visual-wrapper">
                <img src="https://media4.giphy.com/media/v1.Y2lkPTc5MGI3NjExM2d5aWVkYjh1d3Bwejk0ajRuOW56N250dDgzb3ZobnMzdGtkZnpxcCZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/tA21tZURmu6OtmZu48/giphy.gif" alt="Dispatch Visual" class="dispatch-visual">
            </div>

            <div class="glass-panel card">
                <p>New Paragraph</p>

                <p style="margin-top: 15px;">New Paragraph</p>

                
            </div>

            <div class="page-divider"></div>

            <h2 style="font-family: 'Luckiest Guy', cursive; color: var(--text-primary); text-align: center; letter-spacing: 1px;">Leave a Comment</h2>
            
            <div class="glass-panel card" style="border-left: 3px solid var(--emerald-green);">
                <input type="text" id="commenter-name" placeholder="Name / Alias" style="width:100%; background:rgba(0,0,0,0.3); border:1px solid var(--glass-border); color:#fff; border-radius:8px; padding:10px; font-family:'Commissioner',sans-serif; box-sizing:border-box; margin-bottom: 10px;">
                <textarea id="comment-input" placeholder="Enter the discourse..." style="width:100%; height:80px; background:rgba(0,0,0,0.3); border:1px solid var(--glass-border); color:#fff; border-radius:8px; padding:10px; font-family:'Commissioner',sans-serif; box-sizing:border-box; resize:none;"></textarea>
                <button id="submit-comment-btn" class="page-btn" style="width:100%; margin-top:10px; background:linear-gradient(135deg, var(--emerald-green), var(--gold-aspen));">Submit Response</button>
            </div>

            <div id="comments-container" style="margin-top: 20px;">
                <p style="text-align:center; color:var(--gold-aspen); font-size: 0.9rem;">Loading discourse...</p>
            </div>

            <div style="height: 40px;"></div> 
        </main>

        <footer class="glass-panel main-footer">
            <img src="/U01-mini-logo.png" alt="U01 Mini Logo" class="footer-logo">
            <p>&copy; 2026 U01 Authority Operations</p>
            <p class="footer-subtext">Unit of One Collective</p>
        </footer>

    </div>

    <script type="module">
        import { db } from "/assets/js/firebase-config.js";
        import { collection, addDoc, serverTimestamp, query, where, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const POST_ID = "2026-05-31"; 

        const submitBtn = document.getElementById("submit-comment-btn");
        const nameInput = document.getElementById("commenter-name");
        const commentInput = document.getElementById("comment-input");
        const commentsContainer = document.getElementById("comments-container");

        submitBtn.addEventListener("click", async () => {
            const name = nameInput.value.trim() || "Anonymous U01";
            const text = commentInput.value.trim();

            if(!text) return alert("You cannot submit an empty thought.");
            
            submitBtn.disabled = true;
            submitBtn.textContent = "Submitting...";

            try {
                await addDoc(collection(db, "blog_comments"), {
                    postId: POST_ID, 
                    author: name,
                    text: text,
                    timestamp: serverTimestamp()
                });
                commentInput.value = "";
                nameInput.value = "";
            } catch (error) {
                alert("Transmission failed. Try again.");
                console.error(error);
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = "Submit Response";
            }
        });

        const q = query(
            collection(db, "blog_comments"), 
            where("postId", "==", POST_ID), 
            orderBy("timestamp", "desc")
        );
        
        onSnapshot(q, (snapshot) => {
            commentsContainer.innerHTML = ""; 

            if (snapshot.empty) {
                commentsContainer.innerHTML = `<p style="text-align:center; font-style:italic; opacity: 0.7;">Be the first to enter the gauntlet.</p>`;
                return;
            }

            snapshot.forEach((doc) => {
                const data = doc.data();
                
                const safeName = data.author.replace(/</g, "&lt;").replace(/>/g, "&gt;");
                const safeText = data.text.replace(/</g, "&lt;").replace(/>/g, "&gt;");
                
                let timeString = "Just now";
                if (data.timestamp) {
                    const date = data.timestamp.toDate();
                    timeString = date.toLocaleDateString() + ' ' + date.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                }

                const commentCard = document.createElement("div");
                commentCard.className = "glass-panel card";
                commentCard.style.padding = "15px";
                commentCard.style.marginBottom = "10px";
                commentCard.style.background = "rgba(255, 255, 255, 0.02)";
                
                commentCard.innerHTML = `
                    <p style="margin:0; font-size: 0.8rem; color: var(--gold-aspen); border-bottom: 1px solid var(--glass-border); padding-bottom: 5px; margin-bottom: 8px;">
                        <strong>${safeName}</strong> &bull; ${timeString}
                    </p>
                    <p style="margin:0; font-size: 0.95rem;">${safeText}</p>
                `;
                
                commentsContainer.appendChild(commentCard);
            });
        });
    </script>
</body>
</html>
