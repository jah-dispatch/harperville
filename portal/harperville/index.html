<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="robots" content="noindex, nofollow">
    <title>Harperville Comm-Link</title>
    <style>
        :root {
            --tiger-orange: #ff7b00;
            --unicorn-pink: #ff9eee;
            --unicorn-purple: #b28dff;
            --bg-dark: #0a0a0a;
            --panel-bg: #161616;
            --text-main: #f0f0f0;
            --text-muted: #888;
            --border: #333;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            background-image: 
                radial-gradient(circle at top right, rgba(178, 141, 255, 0.15), transparent 40%),
                radial-gradient(circle at bottom left, rgba(255, 123, 0, 0.1), transparent 40%);
        }

        header {
            padding: 20px;
            text-align: center;
            background: linear-gradient(90deg, #111, var(--panel-bg));
            border-bottom: 2px solid var(--tiger-orange);
            box-shadow: 0 4px 15px rgba(255, 123, 0, 0.2);
            flex-shrink: 0;
        }

        h1 {
            font-size: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            background: -webkit-linear-gradient(45deg, var(--tiger-orange), var(--unicorn-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }

        /* Authentication Screen */
        #auth-view {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .auth-box {
            background: var(--panel-bg);
            padding: 30px;
            border-radius: 12px;
            border: 1px solid var(--border);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }

        /* Main App Screen */
        #app-view {
            display: none;
            flex-direction: column;
            flex: 1;
            overflow: hidden;
        }

        .nav-tabs {
            display: flex;
            justify-content: center;
            gap: 10px;
            padding: 15px;
            flex-shrink: 0;
        }

        .tab-btn {
            background: var(--panel-bg);
            border: 1px solid var(--border);
            color: var(--text-muted);
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }

        .tab-btn.active {
            border-color: var(--unicorn-purple);
            color: var(--unicorn-purple);
            box-shadow: 0 0 10px rgba(178, 141, 255, 0.3);
        }

        .view-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            padding: 0 15px 15px 15px;
        }

        .view {
            display: none;
            flex-direction: column;
            height: 100%;
            overflow-y: auto;
        }

        .view.active { display: flex; }

        .section-title {
            font-size: 0.9rem;
            color: var(--tiger-orange);
            margin-bottom: 8px;
            margin-top: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 5px;
        }

        /* Form & Inputs */
        input[type="text"], input[type="date"], select, textarea, input[type="file"] {
            width: 100%;
            background: #222;
            border: 1px solid #444;
            color: white;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 1rem;
            color-scheme: dark;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--unicorn-purple);
            box-shadow: 0 0 8px rgba(178, 141, 255, 0.4);
        }

        .action-btn {
            background: linear-gradient(135deg, var(--tiger-orange), var(--unicorn-pink));
            color: black;
            border: none;
            padding: 15px;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(255, 123, 0, 0.3);
            width: 100%;
        }

        .action-btn:active { transform: scale(0.98); }

        .google-btn {
            background: white;
            color: black;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
            width: 100%;
        }

        /* Task Ledger */
        .task-item {
            background: #222;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            border-left: 4px solid var(--tiger-orange);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .task-item.grocery { border-left-color: var(--unicorn-purple); }
        .task-item.completed { opacity: 0.6; border-left-color: #555; }
        .task-item.completed .task-title { text-decoration: line-through; color: var(--text-muted); }

        .task-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .task-title { font-weight: bold; font-size: 1.1rem; }
        
        .delete-btn {
            background: rgba(255, 50, 50, 0.1);
            border: 1px solid rgba(255, 50, 50, 0.3);
            color: white;
            border-radius: 6px;
            padding: 5px 10px;
            cursor: pointer;
            font-size: 0.8rem;
        }

        .task-image {
            max-width: 100%;
            border-radius: 6px;
            border: 1px solid #444;
            max-height: 200px;
            object-fit: cover;
            display: none;
        }

        .checkbox-wrapper {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }

        input[type="checkbox"] {
            width: 20px;
            height: 20px;
            accent-color: var(--tiger-orange);
            cursor: pointer;
        }

        /* Comments */
        .comment-section {
            background: rgba(0,0,0,0.2);
            padding: 10px;
            border-radius: 6px;
            margin-top: 5px;
        }

        .comment-display {
            font-size: 0.85rem;
            color: #ccc;
            margin-bottom: 8px;
        }

        .comment-author { color: var(--unicorn-pink); font-weight: bold; }

        .comment-input-row {
            display: flex;
            gap: 10px;
        }

        .comment-input-row input {
            margin-bottom: 0;
            padding: 8px;
            font-size: 0.9rem;
        }

        .btn-small {
            background: #444;
            color: white;
            border: none;
            padding: 0 15px;
            border-radius: 6px;
            cursor: pointer;
        }

        #error-msg {
            color: #ff4c4c;
            margin-top: 15px;
            font-weight: bold;
            display: none;
        }

    </style>
</head>
<body>

    <header>
        <h1>✨ Harperville Comm-Link 🐅</h1>
    </header>

    <!-- AUTHENTICATION VIEW -->
    <div id="auth-view">
        <div class="auth-box">
            <h2 style="margin-bottom: 10px;">Secret Portal Access</h2>
            <p style="color: var(--text-muted); font-size: 0.9rem;">Restricted to authorized Care Team members only.</p>
            <button id="login-btn" class="google-btn">Sign in with Google</button>
            <div id="error-msg">Access Denied. Unauthorized Email.</div>
        </div>
    </div>

    <!-- MAIN APP VIEW -->
    <div id="app-view">
        <div class="nav-tabs">
            <button class="tab-btn active" id="tab-agenda">Active Agenda</button>
            <button class="tab-btn" id="tab-add">Add Directive</button>
            <button class="tab-btn" id="logout-btn" style="border-color: #ff4c4c; color: #ff4c4c;">Exit</button>
        </div>

        <div class="view-container">
            
            <!-- AGENDA VIEW -->
            <div id="view-agenda" class="view active">
                <div id="tasks-container">
                    <div style="text-align:center; color: var(--text-muted); margin-top: 20px;">Loading Agenda...</div>
                </div>
            </div>

            <!-- ADD NEW VIEW -->
            <div id="view-add" class="view">
                <label style="color: var(--tiger-orange); font-size: 0.85rem; font-weight: bold; text-transform: uppercase;">Assign to Shift Date</label>
                <input type="date" id="task-date" required>

                <label style="color: var(--tiger-orange); font-size: 0.85rem; font-weight: bold; text-transform: uppercase;">Directive Type</label>
                <select id="task-type">
                    <option value="agenda">Shift Agenda / Task</option>
                    <option value="grocery">Grocery / Shopping List</option>
                </select>

                <label style="color: var(--tiger-orange); font-size: 0.85rem; font-weight: bold; text-transform: uppercase;">Details</label>
                <input type="text" id="task-title" placeholder="e.g., Pick up oat milk, Check mail..." required>

                <label style="color: var(--tiger-orange); font-size: 0.85rem; font-weight: bold; text-transform: uppercase;">Attach Image (Optional)</label>
                <input type="file" id="task-image" accept="image/*">

                <button class="action-btn" id="submit-task-btn">Post Directive</button>
            </div>
        </div>
    </div>

    <!-- FIREBASE MODULAR SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, updateDoc, deleteDoc, doc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-storage.js";

        // ==========================================
        // 1. PASTE YOUR NEW FIREBASE KEYS HERE
        // ==========================================
        const firebaseConfig = {
            apiKey: "AIzaSyBGkqfs3nDZ2Stczs_qzpwEwQfB5zeeX1U",
            authDomain: "harperville-comm-link.firebaseapp.com",
            projectId: "harperville-comm-link",
            storageBucket: "harperville-comm-link.firebasestorage.app",
            messagingSenderId: "775465053610",
            appId: "1:775465053610:web:4d62259c5e0162dca28fd3"
        };

        // ==========================================
        // 2. AUTHORIZED EMAILS (Lowercase Only)
        // ==========================================
        const AUTHORIZED_EMAILS = [
            "jackaspenharper@gmail.com", 
            "graciellagalan19@gmail.com" 
        ];

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const storage = getStorage(app);
        
        let currentUser = null;

        // UI Elements
        const authView = document.getElementById('auth-view');
        const appView = document.getElementById('app-view');
        const errorMsg = document.getElementById('error-msg');
        const tasksContainer = document.getElementById('tasks-container');

        // Set default date picker to today
        document.getElementById('task-date').value = new Date().toISOString().split('T')[0];

        // Tab Switching
        document.getElementById('tab-agenda').onclick = () => switchTab('agenda');
        document.getElementById('tab-add').onclick = () => switchTab('add');

        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            if(tab === 'agenda') {
                document.getElementById('tab-agenda').classList.add('active');
                document.getElementById('view-agenda').classList.add('active');
            } else {
                document.getElementById('tab-add').classList.add('active');
                document.getElementById('view-add').classList.add('active');
            }
        }

        // --- AUTHENTICATION FLOW ---
        const provider = new GoogleAuthProvider();

        document.getElementById('login-btn').onclick = async () => {
            try {
                await signInWithPopup(auth, provider);
            } catch (error) {
                console.error("Login failed", error);
            }
        };

        document.getElementById('logout-btn').onclick = () => signOut(auth);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                if (AUTHORIZED_EMAILS.includes(user.email.toLowerCase())) {
                    currentUser = user;
                    authView.style.display = 'none';
                    appView.style.display = 'flex';
                    errorMsg.style.display = 'none';
                    loadAgenda();
                } else {
                    signOut(auth);
                    errorMsg.style.display = 'block';
                    errorMsg.innerText = `Access Denied for ${user.email}`;
                }
            } else {
                currentUser = null;
                authView.style.display = 'flex';
                appView.style.display = 'none';
            }
        });

        // --- DATABASE OPERATIONS ---

        // Add a new directive
        document.getElementById('submit-task-btn').onclick = async () => {
            const btn = document.getElementById('submit-task-btn');
            const shiftDate = document.getElementById('task-date').value;
            const title = document.getElementById('task-title').value;
            const type = document.getElementById('task-type').value;
            const fileInput = document.getElementById('task-image');
            
            if (!title || !shiftDate) return alert("Please enter a date and directive details.");
            
            btn.innerText = "Uploading...";
            btn.disabled = true;

            try {
                let imageUrl = null;

                if (fileInput.files.length > 0) {
                    const file = fileInput.files[0];
                    const storageRef = ref(storage, `uploads/${Date.now()}_${file.name}`);
                    await uploadBytes(storageRef, file);
                    imageUrl = await getDownloadURL(storageRef);
                }

                await addDoc(collection(db, "directives"), {
                    shiftDate: shiftDate,
                    title: title,
                    type: type,
                    completed: false,
                    imageUrl: imageUrl,
                    createdBy: currentUser.displayName,
                    timestamp: new Date().toISOString(),
                    comments: []
                });
                
                // Reset Form
                document.getElementById('task-title').value = '';
                fileInput.value = '';
                switchTab('agenda');

            } catch (error) {
                console.error("Error posting directive: ", error);
                alert("Upload failed! Check your Firestore Security Rules to ensure your email matches exactly.");
            } finally {
                btn.innerText = "Post Directive";
                btn.disabled = false;
            }
        };

        // Real-time listener & Chronological Filter
        function loadAgenda() {
            const q = query(collection(db, "directives"));
            
            onSnapshot(q, (snapshot) => {
                tasksContainer.innerHTML = '';
                const today = new Date().toISOString().split('T')[0];
                let tasksByDate = {};

                snapshot.forEach((docSnap) => {
                    const task = docSnap.data();
                    task.id = docSnap.id;
                    
                    // Filter: Only process if the shift date is today or in the future
                    if (task.shiftDate && task.shiftDate >= today) {
                        if (!tasksByDate[task.shiftDate]) {
                            tasksByDate[task.shiftDate] = [];
                        }
                        tasksByDate[task.shiftDate].push(task);
                    }
                });

                const sortedDates = Object.keys(tasksByDate).sort();

                if(sortedDates.length === 0) {
                    tasksContainer.innerHTML = '<div style="text-align:center; color: var(--text-muted); margin-top: 20px;">No upcoming shifts scheduled.</div>';
                    return;
                }

                sortedDates.forEach(date => {
                    // Create Date Header
                    const header = document.createElement('div');
                    header.className = 'section-title';
                    
                    // Format date nicely (e.g., "Shift: 2026-06-25")
                    header.innerText = `Scheduled Shift: ${date}`;
                    tasksContainer.appendChild(header);

                    // Append tasks for this date
                    tasksByDate[date].forEach(task => {
                        const div = document.createElement('div');
                        div.className = `task-item ${task.type} ${task.completed ? 'completed' : ''}`;
                        
                        let commentsHTML = task.comments.map(c => 
                            `<div class="comment-display"><span class="comment-author">${c.author}:</span> ${c.text}</div>`
                        ).join('');

                        div.innerHTML = `
                            <div class="task-header">
                                <label class="checkbox-wrapper">
                                    <input type="checkbox" ${task.completed ? 'checked' : ''} onchange="toggleComplete('${task.id}', this.checked)">
                                    <span class="task-title">${task.title}</span>
                                </label>
                                <button class="delete-btn" onclick="deleteDirective('${task.id}')">Delete</button>
                            </div>
                            
                            ${task.imageUrl ? `<img src="${task.imageUrl}" class="task-image" style="display:block; margin-top:10px;">` : ''}
                            
                            <div class="comment-section">
                                ${commentsHTML}
                                <div class="comment-input-row" style="margin-top: 8px;">
                                    <input type="text" id="comment-input-${task.id}" placeholder="Add a note..." style="flex:1;">
                                    <button class="btn-small" onclick="addComment('${task.id}')">Send</button>
                                </div>
                            </div>
                        `;
                        tasksContainer.appendChild(div);
                    });
                });
            });
        }

        // Global functions for inline HTML
        window.toggleComplete = async (taskId, isChecked) => {
            const taskRef = doc(db, "directives", taskId);
            await updateDoc(taskRef, { completed: isChecked });
        };

        window.deleteDirective = async (taskId) => {
            if(confirm("Remove this directive from the shift?")) {
                await deleteDoc(doc(db, "directives", taskId));
            }
        };

        window.addComment = async (taskId) => {
            const input = document.getElementById(`comment-input-${taskId}`);
            const text = input.value.trim();
            if (!text) return;

            const taskRef = doc(db, "directives", taskId);
            
            import("https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js").then(async ({ getDoc }) => {
                const snap = await getDoc(taskRef);
                const currentComments = snap.data().comments || [];
                currentComments.push({
                    author: currentUser.displayName || currentUser.email.split('@')[0],
                    text: text,
                    timestamp: new Date().toISOString()
                });
                await updateDoc(taskRef, { comments: currentComments });
                input.value = '';
            });
        };
    </script>
</body>
</html>
