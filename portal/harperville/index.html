<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="robots" content="noindex, nofollow">
    <title>Harperville - Grace | Comm-Link</title>
    <style>
        :root {
            --tiger-orange: #ff7b00;
            --tiger-glow: rgba(255, 123, 0, 0.4);
            --unicorn-pink: #ff9eee;
            --unicorn-purple: #b28dff;
            --unicorn-glow: rgba(178, 141, 255, 0.4);
            --bg-dark: #0f0f13;
            --panel-bg: rgba(25, 25, 30, 0.6);
            --text-main: #f8f8f8;
            --text-muted: #a0a0a5;
            --border: rgba(255, 255, 255, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            /* Modern sleek background gradients */
            background-image: 
                radial-gradient(circle at 80% -20%, var(--unicorn-glow), transparent 40%),
                radial-gradient(circle at 20% 120%, var(--tiger-glow), transparent 40%);
            background-attachment: fixed;
        }

        header {
            padding: 25px 20px 15px 20px;
            text-align: center;
            background: rgba(15, 15, 19, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
            flex-shrink: 0;
            z-index: 10;
        }

        h1 {
            font-size: 1.6rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            background: linear-gradient(45deg, var(--tiger-orange), var(--unicorn-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 900;
            margin-bottom: 8px;
        }

        /* Live Clock */
        #live-clock {
            font-size: 0.95rem;
            color: var(--text-muted);
            font-weight: 500;
            letter-spacing: 1px;
        }

        /* Authentication Screen */
        #auth-view {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .auth-box {
            background: var(--panel-bg);
            backdrop-filter: blur(16px);
            padding: 40px 30px;
            border-radius: 20px;
            border: 1px solid var(--border);
            text-align: center;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        /* Main App Screen */
        #app-view {
            display: none;
            flex-direction: column;
            flex: 1;
            overflow: hidden;
        }

        .nav-tabs {
            display: flex;
            justify-content: center;
            gap: 15px;
            padding: 20px;
            flex-shrink: 0;
        }

        .tab-btn {
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--border);
            color: var(--text-muted);
            padding: 12px 24px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
        }

        .tab-btn.active {
            background: rgba(178, 141, 255, 0.1);
            border-color: var(--unicorn-purple);
            color: var(--text-main);
            box-shadow: 0 0 15px rgba(178, 141, 255, 0.2);
        }

        .view-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            padding: 0 20px 20px 20px;
        }

        .view {
            display: none;
            flex-direction: column;
            height: 100%;
            overflow-y: auto;
            padding-bottom: 40px;
        }

        .view.active { display: flex; }

        /* Modern Form Inputs */
        .input-label {
            color: var(--unicorn-pink);
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-top: 20px;
            margin-bottom: 8px;
            display: block;
        }

        input[type="text"], input[type="date"], select {
            width: 100%;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 15px;
            border-radius: 12px;
            font-size: 1rem;
            color-scheme: dark;
            transition: border-color 0.3s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--tiger-orange);
            background: rgba(0, 0, 0, 0.6);
        }

        .action-btn {
            background: linear-gradient(135deg, var(--tiger-orange), var(--unicorn-pink));
            color: #000;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 800;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            box-shadow: 0 8px 20px var(--tiger-glow);
            width: 100%;
            margin-top: 30px;
            transition: transform 0.2s;
        }

        .action-btn:active { transform: scale(0.97); }

        .google-btn {
            background: #fff;
            color: #000;
            border: none;
            padding: 14px 24px;
            border-radius: 30px;
            font-size: 1.05rem;
            font-weight: 800;
            cursor: pointer;
            margin-top: 20px;
            width: 100%;
        }

        /* Shift Date Grouping (The Breathing Room) */
        .date-group {
            background: var(--panel-bg);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 30px; /* Massive breathing room between shifts */
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
        }

        .date-header {
            font-size: 1.3rem;
            color: var(--tiger-orange);
            font-weight: 800;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 10px;
            letter-spacing: 1px;
        }

        /* Task Items */
        .task-item {
            background: rgba(0, 0, 0, 0.3);
            padding: 16px;
            border-radius: 12px;
            margin-bottom: 12px;
            border-left: 4px solid var(--tiger-orange);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .task-item.grocery { border-left-color: var(--unicorn-purple); }
        .task-item.completed { opacity: 0.4; border-left-color: #333; }
        .task-item.completed .task-title { text-decoration: line-through; color: var(--text-muted); }

        .task-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .task-title { font-weight: 600; font-size: 1.1rem; line-height: 1.4; }
        
        .delete-btn {
            background: rgba(255, 50, 50, 0.1);
            border: 1px solid rgba(255, 50, 50, 0.2);
            color: #ff8888;
            border-radius: 8px;
            padding: 6px 12px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: bold;
            transition: background 0.2s;
        }

        .delete-btn:active { background: rgba(255, 50, 50, 0.3); }

        .checkbox-wrapper {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            cursor: pointer;
            flex: 1;
            padding-right: 15px;
        }

        input[type="checkbox"] {
            width: 22px;
            height: 22px;
            accent-color: var(--tiger-orange);
            cursor: pointer;
            margin-top: 2px;
        }

        /* Comments */
        .comment-section {
            background: rgba(255, 255, 255, 0.03);
            padding: 12px;
            border-radius: 10px;
        }

        .comment-display {
            font-size: 0.9rem;
            color: #ddd;
            margin-bottom: 8px;
            line-height: 1.4;
        }

        .comment-author { color: var(--unicorn-pink); font-weight: 700; margin-right: 5px; }

        .comment-input-row {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .comment-input-row input {
            margin-bottom: 0;
            padding: 10px 15px;
            font-size: 0.95rem;
            border-radius: 8px;
        }

        .btn-small {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-main);
            border: 1px solid var(--border);
            padding: 0 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        #error-msg {
            color: #ff6b6b;
            margin-top: 20px;
            font-weight: bold;
            display: none;
            padding: 10px;
            background: rgba(255, 0, 0, 0.1);
            border-radius: 8px;
        }

    </style>
</head>
<body>

    <header>
        <h1>✨ Harperville Comm-Link 🐅</h1>
        <div id="live-clock">Syncing Temporal Data...</div>
    </header>

    <!-- AUTHENTICATION VIEW -->
    <div id="auth-view">
        <div class="auth-box">
            <h2 style="margin-bottom: 15px;">Secure Access</h2>
            <p style="color: var(--text-muted); font-size: 0.95rem; line-height: 1.5;">End-to-end encrypted portal restricted to authorized Unit of One care personnel.</p>
            <button id="login-btn" class="google-btn">Sign in with Google</button>
            <div id="error-msg">Access Denied. Unauthorized Email.</div>
        </div>
    </div>

    <!-- MAIN APP VIEW -->
    <div id="app-view">
        <div class="nav-tabs">
            <button class="tab-btn active" id="tab-agenda">Active Agenda</button>
            <button class="tab-btn" id="tab-add">Assign Task</button>
            <button class="tab-btn" id="logout-btn" style="border-color: rgba(255, 100, 100, 0.4); color: #ff8888;">Lock</button>
        </div>

        <div class="view-container">
            
            <!-- AGENDA VIEW -->
            <div id="view-agenda" class="view active">
                <div id="tasks-container">
                    <div style="text-align:center; color: var(--text-muted); margin-top: 40px; font-size: 1.1rem;">Scanning for upcoming shifts...</div>
                </div>
            </div>

            <!-- ADD NEW VIEW -->
            <div id="view-add" class="view">
                <label class="input-label">Shift Date</label>
                <input type="date" id="task-date" required>

                <label class="input-label">Classification</label>
                <select id="task-type">
                    <option value="agenda">Shift Agenda / General Task</option>
                    <option value="grocery">Procurement / Shopping List</option>
                </select>

                <label class="input-label">Directive Details</label>
                <input type="text" id="task-title" placeholder="e.g., Pick up oat milk, Check mail..." required autocomplete="off">

                <button class="action-btn" id="submit-task-btn">Post to Agenda</button>
            </div>
        </div>
    </div>

    <!-- FIREBASE MODULAR SDK -->
    <script type="module">
        // Stripped Storage imports - Text only system.
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, updateDoc, deleteDoc, doc, query } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // ==========================================
        // 1. PASTE YOUR FIREBASE KEYS HERE
        // ==========================================
        const firebaseConfig = {
            apiKey: "AIzaSyBGkqfs3nDZ2Stczs_qzpwEwQfB5zeeX1U",
            authDomain: "harperville-comm-link.firebaseapp.com",
            projectId: "harperville-comm-link",
            storageBucket: "harperville-comm-link.firebasestorage.app",
            messagingSenderId: "775465053610",
            appId: "1:775465053610:web:4d62259c5e0162dca28fd3"
        };

        // ==========================================
        // 2. AUTHORIZED EMAILS (Lowercase Only)
        // ==========================================
        const AUTHORIZED_EMAILS = [
            "jackaspenharper@gmail.com", 
            "graciellagalan19@gmail.com" 
        ];

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        
        let currentUser = null;

        // UI Elements
        const authView = document.getElementById('auth-view');
        const appView = document.getElementById('app-view');
        const errorMsg = document.getElementById('error-msg');
        const tasksContainer = document.getElementById('tasks-container');

        // --- LIVE CLOCK LOGIC ---
        function updateClock() {
            const now = new Date();
            const options = { weekday: 'short', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit', second: '2-digit' };
            document.getElementById('live-clock').innerText = now.toLocaleDateString('en-US', options);
        }
        setInterval(updateClock, 1000);
        updateClock();

        // Default date picker to today
        document.getElementById('task-date').value = new Date().toISOString().split('T')[0];

        // Tab Switching
        document.getElementById('tab-agenda').onclick = () => switchTab('agenda');
        document.getElementById('tab-add').onclick = () => switchTab('add');

        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            if(tab === 'agenda') {
                document.getElementById('tab-agenda').classList.add('active');
                document.getElementById('view-agenda').classList.add('active');
            } else {
                document.getElementById('tab-add').classList.add('active');
                document.getElementById('view-add').classList.add('active');
            }
        }

        // --- AUTHENTICATION FLOW ---
        const provider = new GoogleAuthProvider();

        document.getElementById('login-btn').onclick = async () => {
            try {
                await signInWithPopup(auth, provider);
            } catch (error) {
                console.error("Login failed", error);
            }
        };

        document.getElementById('logout-btn').onclick = () => signOut(auth);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                if (AUTHORIZED_EMAILS.includes(user.email.toLowerCase())) {
                    currentUser = user;
                    authView.style.display = 'none';
                    appView.style.display = 'flex';
                    errorMsg.style.display = 'none';
                    loadAgenda();
                } else {
                    signOut(auth);
                    errorMsg.style.display = 'block';
                    errorMsg.innerText = `Access Denied for ${user.email}`;
                }
            } else {
                currentUser = null;
                authView.style.display = 'flex';
                appView.style.display = 'none';
            }
        });

        // --- DATABASE OPERATIONS ---

        // Add a new directive (Text Only)
        document.getElementById('submit-task-btn').onclick = async () => {
            const btn = document.getElementById('submit-task-btn');
            const shiftDate = document.getElementById('task-date').value;
            const title = document.getElementById('task-title').value;
            const type = document.getElementById('task-type').value;
            
            if (!title || !shiftDate) return alert("Please enter a date and directive details.");
            
            btn.innerText = "Transmitting...";
            btn.disabled = true;

            try {
                await addDoc(collection(db, "directives"), {
                    shiftDate: shiftDate,
                    title: title,
                    type: type,
                    completed: false,
                    createdBy: currentUser.displayName || currentUser.email.split('@')[0],
                    timestamp: new Date().toISOString(),
                    comments: []
                });
                
                document.getElementById('task-title').value = '';
                switchTab('agenda');

            } catch (error) {
                console.error("Error posting directive: ", error);
                alert("Database rejection. Ensure your email is fully whitelisted in the Firestore rules.");
            } finally {
                btn.innerText = "Post to Agenda";
                btn.disabled = false;
            }
        };

        // Real-time listener & Card Grouping
        function loadAgenda() {
            const q = query(collection(db, "directives"));
            
            onSnapshot(q, (snapshot) => {
                tasksContainer.innerHTML = '';
                const today = new Date().toISOString().split('T')[0];
                let tasksByDate = {};

                snapshot.forEach((docSnap) => {
                    const task = docSnap.data();
                    task.id = docSnap.id;
                    
                    if (task.shiftDate && task.shiftDate >= today) {
                        if (!tasksByDate[task.shiftDate]) {
                            tasksByDate[task.shiftDate] = [];
                        }
                        tasksByDate[task.shiftDate].push(task);
                    }
                });

                const sortedDates = Object.keys(tasksByDate).sort();

                if(sortedDates.length === 0) {
                    tasksContainer.innerHTML = '<div style="text-align:center; color: var(--text-muted); margin-top: 40px; font-size: 1.1rem;">Agenda Clear. No upcoming directives.</div>';
                    return;
                }

                sortedDates.forEach(date => {
                    // Create the floating card container for the date
                    const dateGroup = document.createElement('div');
                    dateGroup.className = 'date-group';
                    
                    // Format the Header
                    const header = document.createElement('div');
                    header.className = 'date-header';
                    
                    // Quick date format conversion for readability
                    const dateObj = new Date(date + 'T12:00:00'); 
                    const displayDate = dateObj.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
                    
                    header.innerHTML = `📅 ${displayDate}`;
                    dateGroup.appendChild(header);

                    // Append tasks into this specific card
                    tasksByDate[date].forEach(task => {
                        const div = document.createElement('div');
                        div.className = `task-item ${task.type} ${task.completed ? 'completed' : ''}`;
                        
                        let commentsHTML = task.comments.map(c => 
                            `<div class="comment-display"><span class="comment-author">${c.author}:</span> ${c.text}</div>`
                        ).join('');

                        div.innerHTML = `
                            <div class="task-header">
                                <label class="checkbox-wrapper">
                                    <input type="checkbox" ${task.completed ? 'checked' : ''} onchange="toggleComplete('${task.id}', this.checked)">
                                    <span class="task-title">${task.title}</span>
                                </label>
                                <button class="delete-btn" onclick="deleteDirective('${task.id}')">Drop</button>
                            </div>
                            
                            <div class="comment-section">
                                ${commentsHTML}
                                <div class="comment-input-row">
                                    <input type="text" id="comment-input-${task.id}" placeholder="Add intel or reply..." style="flex:1;">
                                    <button class="btn-small" onclick="addComment('${task.id}')">Send</button>
                                </div>
                            </div>
                        `;
                        dateGroup.appendChild(div);
                    });

                    // Push the entire finished card into the main container
                    tasksContainer.appendChild(dateGroup);
                });
            });
        }

        // Global functions
        window.toggleComplete = async (taskId, isChecked) => {
            const taskRef = doc(db, "directives", taskId);
            await updateDoc(taskRef, { completed: isChecked });
        };

        window.deleteDirective = async (taskId) => {
            if(confirm("Permanently drop this directive from the agenda?")) {
                await deleteDoc(doc(db, "directives", taskId));
            }
        };

        window.addComment = async (taskId) => {
            const input = document.getElementById(`comment-input-${taskId}`);
            const text = input.value.trim();
            if (!text) return;

            const taskRef = doc(db, "directives", taskId);
            
            import("https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js").then(async ({ getDoc }) => {
                const snap = await getDoc(taskRef);
                const currentComments = snap.data().comments || [];
                currentComments.push({
                    author: currentUser.displayName || currentUser.email.split('@')[0],
                    text: text,
                    timestamp: new Date().toISOString()
                });
                await updateDoc(taskRef, { comments: currentComments });
                input.value = '';
            });
        };
    </script>
</body>
</html>
