<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Harperville | Digital Flagship | Sovereign Authority</title>
    <link rel="stylesheet" href="build1.css">
</head>
<body class="main-body">
    <div class="app-container">
        
       <!-- Navigation Header -->
        <header class="glass-panel nav-header">
            <!-- Icon linked back to splash.html -->
            <a href="splash.html">
                <img src="assets/images/U01-icon.png" alt="Sovereign Menu" class="nav-icon">
            </a>
            <nav class="hidden-menu">
                <a href="about.html">Jack Harper</a>
                <a href="advocacy.html">Advocacy</a>
                <a href="#">Blog</a>
            </nav>
        </header>

        <!-- Main Content -->
        <main class="content-area">
            <h1 class="luckiest-header">Welcome to Harperville</h1>

            <div class="page-divider"></div>

            <h2>Just some quick thoughts...</h2>            
            
            <!-- JavaScript will completely build this container automatically -->
            <div id="thought-container">
                <div class="glass-panel card" id="loading-state">
                    <p style="text-align:center; color:var(--gold-aspen);">Syncing with Firestore Database...</p>
                </div>
            </div> 

            <!-- Pagination buttons automatically injected here -->
            <div id="pagination-controls" class="pagination-glass"></div>

        </main>

        <!-- Footer -->
        <footer class="glass-panel main-footer">
            <img src="../assets/images/U01-mini-logo.png" alt="U01 Mini Logo" class="footer-logo">
            <p>&copy; 2026 Sovereign Authority Operations</p>
            <p class="footer-subtext">Unit of One Collective</p>
        </footer>

    </div>

    <!-- DYNAMIC FIREBASE STREAMING ENGINE -->
    <script type="module">
        import { db } from "./assets/js/firebase-config.js";
        import { collection, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const container = document.getElementById("thought-container");
        const paginationControls = document.getElementById("pagination-controls");
        const cardsPerPage = 3;
        let currentPage = 1;
        let allCards = [];

        // Stream thoughts in real-time from database, sorted newest first
        const q = query(collection(db, "thoughts"), orderBy("timestamp", "desc"));
        
        onSnapshot(q, (snapshot) => {
            container.innerHTML = ""; // Clear loading screen or old cards
            allCards = [];

            if (snapshot.empty) {
                container.innerHTML = `<div class="glass-panel card"><p style="text-align:center;">The database is currently silent.</p></div>`;
                paginationControls.innerHTML = "";
                return;
            }

            // Dynamically generate HTML elements for each database document
            snapshot.forEach((doc) => {
                const data = doc.data();
                const card = document.createElement("div");
                card.className = "glass-panel card";
                card.innerHTML = `<p>${data.text}</p>`;
                allCards.push(card);
                container.appendChild(card);
            });

            // Run pagination layout
            displayPage(currentPage);
        });

        function displayPage(page) {
            allCards.forEach(card => {
                card.style.display = "none";
                card.style.animation = "none";
            });
            
            const startIndex = (page - 1) * cardsPerPage;
            const endIndex = startIndex + cardsPerPage;
            
            const activeCards = allCards.slice(startIndex, endIndex);
            activeCards.forEach(card => {
                card.style.display = "block";
                void card.offsetWidth; 
                card.style.animation = "fadeInCard 0.4s ease forwards";
            });
            
            updateButtons(page);
        }

        function updateButtons(activePage) {
            paginationControls.innerHTML = "";
            const totalPages = Math.ceil(allCards.length / cardsPerPage);
            
            if (totalPages > 1) {
                for (let i = 1; i <= totalPages; i++) {
                    const btn = document.createElement("button");
                    btn.textContent = i;
                    btn.className = "page-btn";
                    if (i === activePage) btn.classList.add("active");
                    
                    btn.addEventListener("click", () => {
                        currentPage = i;
                        displayPage(currentPage);
                        document.querySelector("h2").scrollIntoView({ behavior: "smooth" });
                    });
                    
                    paginationControls.appendChild(btn);
                }
            }
        }
    </script>
</body>
</html>
