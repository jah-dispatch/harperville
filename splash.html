<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Harperville | Digital Flagship | U01 Authority</title>
    <link rel="stylesheet" href="build1.css">
</head>
<body class="main-body">
    <div class="app-container">
        
       <!-- Navigation Header -->
        <header class="glass-panel nav-header">
            <!-- Icon linked back to splash.html -->
            <a href="splash.html">
                <img src="U01-icon.png" alt="U01 Menu" class="nav-icon">
            </a>
            <nav class="hidden-menu">
                <a href="about.html">Jack Harper</a>
                <a href="advocacy.html">Advocacy</a>
                <a href="#">Blog</a>
            </nav>
        </header>

        <!-- Main Content -->
        <main class="content-area">
            <h1 class="luckiest-header" style="text-align: center;">Welcome to Harperville</h1>

            <!-- NEW: Dynamic Date & Commentary Banner -->
            <div class="glass-panel card" style="text-align: center; padding: 15px; margin-bottom: 20px; border-left: 3px solid var(--emerald-green);">
                <p id="dynamic-date" style="font-weight: 700; color: var(--text-primary); margin: 0 0 5px 0; letter-spacing: 0.5px;"></p>
                <p style="margin: 0; font-size: 0.85rem; color: var(--gold-aspen); font-style: italic;">...and this space is provided to you by pure, unadulterated personal commentary.</p>
            </div>

            <!-- JavaScript for the Date Banner -->
            <script>
                const dateElement = document.getElementById('dynamic-date');
                const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
                const currentDate = new Date().toLocaleDateString('en-US', options);
                dateElement.textContent = `Today is: ${currentDate}`;
            </script>

            <div class="page-divider"></div>

            <h2>Just some quick thoughts...</h2>            
            
            <!-- JavaScript will completely build this container automatically -->
            <div id="thought-container">
                <div class="glass-panel card" id="loading-state">
                    <p style="text-align:center; color:var(--gold-aspen);">Syncing with Firestore Database...</p>
                </div>
            </div> 

            <!-- Pagination buttons automatically injected here -->
            <div id="pagination-controls" class="pagination-glass"></div>

        </main>

        <!-- Footer -->
        <footer class="glass-panel main-footer">
            <img src="U01-mini-logo.png" alt="U01 Mini Logo" class="footer-logo">
            <p>&copy; 2026 U01 Authority Operations</p>
            <p class="footer-subtext">Unit of One Collective</p>
        </footer>

    </div>

    <!-- DYNAMIC FIREBASE STREAMING ENGINE -->
    <script type="module">
        import { db } from "./assets/js/firebase-config.js";
        import { collection, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const container = document.getElementById("thought-container");
        const paginationControls = document.getElementById("pagination-controls");
        const cardsPerPage = 3;
        let currentPage = 1;
        let allCards = [];

        // Stream thoughts in real-time from database, sorted newest first
        const q = query(collection(db, "thoughts"), orderBy("timestamp", "desc"));
        
        onSnapshot(q, (snapshot) => {
            container.innerHTML = ""; // Clear loading screen or old cards
            allCards = [];

            if (snapshot.empty) {
                container.innerHTML = `<div class="glass-panel card"><p style="text-align:center;">The database is currently silent.</p></div>`;
                paginationControls.innerHTML = "";
                return;
            }

            // Dynamically generate HTML elements for each database document
            snapshot.forEach((doc) => {
                const data = doc.data();
                const card = document.createElement("div");
                card.className = "glass-panel card";
                
                // 1. Sanitize text to prevent any accidental HTML injection bugs
                let safeText = data.text.replace(/</g, "&lt;").replace(/>/g, "&gt;");
                
                // 2. The Regex Engine: Hunts for any web address ending in an image file type
                const imgRegex = /(https?:\/\/[^\s]+\.(?:jpg|jpeg|png|gif|webp))/gi;
                
                // 3. Replaces the raw URL text with a fully styled HTML image tag
                let formattedText = safeText.replace(imgRegex, '<br><img src="$1" alt="Visual Thought" style="max-width:100%; border-radius:12px; margin-top:10px; border:1px solid var(--glass-border); display:block;">');
                
                card.innerHTML = `<p>${formattedText}</p>`;
                allCards.push(card);
                container.appendChild(card);
            });

            // Run pagination layout
            displayPage(currentPage);
        });

        function displayPage(page) {
            allCards.forEach(card => {
                card.style.display = "none";
                card.style.animation = "none";
            });
            
            const startIndex = (page - 1) * cardsPerPage;
            const endIndex = startIndex + cardsPerPage;
            
            const activeCards = allCards.slice(startIndex, endIndex);
            activeCards.forEach(card => {
                card.style.display = "block";
                void card.offsetWidth; 
                card.style.animation = "fadeInCard 0.4s ease forwards";
            });
            
            updateButtons(page);
        }

        function updateButtons(activePage) {
            paginationControls.innerHTML = "";
            const totalPages = Math.ceil(allCards.length / cardsPerPage);
            
            if (totalPages > 1) {
                for (let i = 1; i <= totalPages; i++) {
                    const btn = document.createElement("button");
                    btn.textContent = i;
                    btn.className = "page-btn";
                    if (i === activePage) btn.classList.add("active");
                    
                    btn.addEventListener("click", () => {
                        currentPage = i;
                        displayPage(currentPage);
                        document.querySelector("h2").scrollIntoView({ behavior: "smooth" });
                    });
                    
                    paginationControls.appendChild(btn);
                }
            }
        }
    </script>
</body>
</html>
