<body class="main-body">

    <script>
        // ---------------------------------------------------------
        // THE U01 LEDGER
        // When you write a new post, copy the top block, paste it above, 
        // and update the title, date, and link. Keep the newest at the top.
        // ---------------------------------------------------------
        const blogDatabase = [
            
        { 
                title: "Why the Unit of One Movement Ends Here", 
                date: "July 1, 2026", 
                link: "blog/2026/07-01.html" 
            },
        { 
                title: "Hardware, Haste, and Impermeable Boundaries", 
                date: "June 22, 2026", 
                link: "blog/2026/06-22.html" 
            },
        { 
                title: "Taylor Swift isn't a U01, But...", 
                date: "June 2, 2026", 
                link: "blog/2026/06-02.html" 
            },
        { 
                title: "The Unit of One Manifesto", 
                date: "May 31, 2026", 
                link: "blog/2026/05-31.html" 
            },    
        { 
                title: "My Cat Saves My Life Every Day", 
                date: "May 30, 2026", 
                link: "blog/2026/05-30.html" 
            }
        ];

        // ---------------------------------------------------------
        // THE RENDER ENGINE (Do not touch below this line)
        // ---------------------------------------------------------
        const container = document.getElementById("archive-container");
        const paginationControls = document.getElementById("pagination-controls");
        const cardsPerPage = 5; // Shows 5 blog titles per page
        let currentPage = 1;
        let allCards = [];

        // Build the HTML cards from the database array
        blogDatabase.forEach((post) => {
            const card = document.createElement("a"); 
            card.href = post.link;
            card.className = "glass-panel blog-archive-card";
            
            card.innerHTML = `
                <h2 class="archive-title">${post.title}</h2>
                <p class="archive-date">Dispatch &bull; ${post.date}</p>
            `;
            
            allCards.push(card);
            container.appendChild(card);
        });

        // Pagination Logic
        function displayPage(page) {
            allCards.forEach(card => {
                card.style.display = "none";
                card.style.animation = "none";
            });
            
            const startIndex = (page - 1) * cardsPerPage;
            const endIndex = startIndex + cardsPerPage;
            
            const activeCards = allCards.slice(startIndex, endIndex);
            activeCards.forEach(card => {
                card.style.display = "flex"; 
                void card.offsetWidth; 
                card.style.animation = "fadeInCard 0.4s ease forwards";
            });
            
            updateButtons(page);
        }

        function updateButtons(activePage) {
            paginationControls.innerHTML = "";
            const totalPages = Math.ceil(allCards.length / cardsPerPage);
            
            if (totalPages > 1) {
                // The Previous Anchor
                const prevBtn = document.createElement("button");
                prevBtn.innerHTML = "&laquo;"; 
                prevBtn.className = "page-btn";
                if (activePage === 1) prevBtn.disabled = true;
                prevBtn.addEventListener("click", () => {
                    if (currentPage > 1) {
                        currentPage--;
                        displayPage(currentPage);
                        document.querySelector(".architecture-card").scrollIntoView({ behavior: "smooth" });
                    }
                });
                paginationControls.appendChild(prevBtn);

                // The Smart Number Window
                let startPage = Math.max(1, activePage - 1);
                let endPage = Math.min(totalPages, activePage + 1);

                if (activePage === 1) endPage = Math.min(totalPages, 3);
                if (activePage === totalPages) startPage = Math.max(1, totalPages - 2);

                for (let i = startPage; i <= endPage; i++) {
                    const btn = document.createElement("button");
                    btn.textContent = i;
                    btn.className = "page-btn";
                    if (i === activePage) btn.classList.add("active");
                    
                    btn.addEventListener("click", () => {
                        currentPage = i;
                        displayPage(currentPage);
                        document.querySelector(".architecture-card").scrollIntoView({ behavior: "smooth" });
                    });
                    
                    paginationControls.appendChild(btn);
                }

                // The Next Anchor
                const nextBtn = document.createElement("button");
                nextBtn.innerHTML = "&raquo;"; 
                nextBtn.className = "page-btn";
                if (activePage === totalPages) nextBtn.disabled = true;
                nextBtn.addEventListener("click", () => {
                    if (currentPage < totalPages) {
                        currentPage++;
                        displayPage(currentPage);
                        document.querySelector(".architecture-card").scrollIntoView({ behavior: "smooth" });
                    }
                });
                paginationControls.appendChild(nextBtn);
            }
        }
    </script>
